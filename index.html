async function supaSignUp(email,password,name){

async function supaSaveDestination(userId,item){
  try{
    const notes=S.notes[item.id]||null;
    const share=S.shareData[item.id]||null;
    const payload={
      user_id:userId,city_id:item.id,city:item.city,
      country:item.country,flag:item.flag,score:item.score,
      score_label:item.scoreLabel,trip_type:item.tt,
      notes_data:notes||null,share_data:share||null
    };
    // Try update first, then insert if not exists
    const {data:existing,error:selErr}=await supa.from('saved_destinations')
      .select('id').eq('user_id',userId).eq('city_id',item.id).maybeSingle();
    if(selErr){console.error('Check exist error:',selErr.message);}
    if(existing){
      const {error}=await supa.from('saved_destinations').update(payload)
        .eq('user_id',userId).eq('city_id',item.id);
      if(error)console.error('Update dest error:',error.message);
      else console.log('✅ Destination updated:',item.city);
    }else{
      const {error}=await supa.from('saved_destinations').insert(payload);
      if(error)console.error('Insert dest error:',error.message);
      else console.log('✅ Destination inserted:',item.city);
    }
  }catch(e){console.error('Save dest exception:',e);}
}

function shareResult(city,score,flag,country){
  const isST=S.tt==='st';
  const label=isST?'Short-Term Travel Match':'Long-Term Relocation Match';
  const scoreLabel=score>=90?'Perfect Match':score>=80?'Strong Match':score>=70?'Great Match':'Good Match';
  // Create canvas card
  const canvas=document.createElement('canvas');
  canvas.width=1080;canvas.height=1080;
  const ctx=canvas.getContext('2d');
  // Background gradient
  const bg=ctx.createLinearGradient(0,0,1080,1080);
  bg.addColorStop(0,'#0A0A0F');bg.addColorStop(0.5,'#12080F');bg.addColorStop(1,'#0A0F12');
  ctx.fillStyle=bg;ctx.fillRect(0,0,1080,1080);
  // Pink glow top
  const glow=ctx.createRadialGradient(540,0,0,540,0,600);
  glow.addColorStop(0,'rgba(229,53,160,.18)');glow.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=glow;ctx.fillRect(0,0,1080,1080);
  // Yellow glow bottom right
  const glow2=ctx.createRadialGradient(1080,1080,0,1080,1080,500);
  glow2.addColorStop(0,'rgba(245,228,32,.1)');glow2.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=glow2;ctx.fillRect(0,0,1080,1080);
  // Score ring
  const cx=540,cy=370,r=200;
  ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.strokeStyle='rgba(255,255,255,.06)';ctx.lineWidth=20;ctx.stroke();
  const prog=(score/100)*Math.PI*2;
  ctx.beginPath();ctx.arc(cx,cy,r,-Math.PI/2,-Math.PI/2+prog);
  const grad=ctx.createLinearGradient(cx-r,cy,cx+r,cy);
  grad.addColorStop(0,'#F5E420');grad.addColorStop(1,'#E535A0');
  ctx.strokeStyle=grad;ctx.lineWidth=20;ctx.lineCap='round';ctx.stroke();
  // Flag emoji
  ctx.font='120px serif';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(flag||'✈️',cx,cy);
  // Score number
  ctx.font='bold 80px Helvetica';ctx.fillStyle='#fff';ctx.textAlign='center';
  ctx.fillText(score+'%',cx,cy+r+60);
  ctx.font='28px Helvetica';ctx.fillStyle='rgba(255,255,255,.5)';
  ctx.fillText('match score',cx,cy+r+100);
  // City name
  ctx.font='bold 72px Helvetica';ctx.fillStyle='#fff';ctx.textAlign='center';
  ctx.fillText(city+(country?', '+country:''),cx,cy+r+180);
  // Label badge
  ctx.font='bold 26px Helvetica';ctx.fillStyle='#F5E420';
  ctx.fillText(scoreLabel.toUpperCase(),cx,cy+r+230);
  // Tag line
  ctx.font='32px Helvetica';ctx.fillStyle='rgba(255,255,255,.45)';
  ctx.fillText(isST?'My travel match on':'My relocation match on',cx,900);
  // Branding
  ctx.font='bold 42px Helvetica';
  const br=ctx.createLinearGradient(cx-150,0,cx+150,0);
  br.addColorStop(0,'#F5E420');br.addColorStop(1,'#E535A0');
  ctx.fillStyle=br;ctx.fillText('Experience Travel',cx,960);
  // Share the canvas
  canvas.toBlob(blob=>{
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;a.download='my-match-'+city.toLowerCase().replace(/\s/g,'-')+'.png';
    // Try native share first (mobile)
    if(navigator.share){
      const file=new File([blob],'my-match.png',{type:'image/png'});
      navigator.share({title:'I matched '+score+'% with '+city+' on Experience Travel!',text:'Find your perfect destination at experiencereality.com',files:[file]}).catch(()=>{a.click()});
    }else{
      a.click();
      toast('Card downloaded! Share it anywhere 🎉');
    }
    setTimeout(()=>URL.revokeObjectURL(url),3000);
  },'image/png');
}

function refreshSharedNotes(cityId){
  if(!cityId)return;
  // Find the share token for this city
  const sd=S.shareData[cityId];
  const token=sd?.token;
  if(!token)return;
  // Pull master notes from shared_trips.shared_notes
  supa.from('shared_trips').select('shared_notes').eq('token',token).maybeSingle()
    .then(({data})=>{
      if(data?.shared_notes){
        const notes=typeof data.shared_notes==='object'?data.shared_notes:JSON.parse(data.shared_notes||'{}');
        // Only update if shared copy is different (has more todos etc)
        const local=S.notes[cityId]||{todos:[]};
        const sharedTodos=(notes.todos||[]).length;
        const localTodos=(local.todos||[]).length;
        if(sharedTodos>=localTodos){
          S.notes[cityId]=notes;
          saveState();
          console.log('Refreshed shared notes for',cityId,'todos:',sharedTodos);
        }
      }
    }).catch(()=>{});
}
function openNotesDirect(id){
  S.notesId=id;
  // If this destination has a share token, refresh notes from master copy first
  const token=S.shareData[id]?.token;
  if(token){
    refreshSharedNotes(id);
    setTimeout(()=>{
      const h=rNotes();
      if(h)showModalDirect(h);
    },300); // brief delay to let refresh complete
  }else{
    const h=rNotes();
    if(!h){hideModalDirect();return;}

  }
}
function openShareDirect(id){

      user:S.user,
      saved:S.saved,
      notes:S.notes,
      shareData:S.shareData,
      sIds:[...S.sIds],

      ans:S.ans,

      aiItineraries:S.aiItineraries,
      archived:S.archived||{},
      lastFreeSearch:S.lastFreeSearch||0,
      searchCache:S.searchCache||{},
    };
    localStorage.setItem(STORAGE_KEY,JSON.stringify(toSave));
  }catch(e){console.warn('Save state error:',e);}
}
function loadState(){
  try{
    const raw=localStorage.getItem(STORAGE_KEY);
    if(!raw)return;

    // Only restore state if it belongs to the stored user
    if(storedUid && saved.user?.id && storedUid===saved.user.id){
      S.user=saved.user;
      S.saved=saved.saved||[];
      S.notes=saved.notes||{};
      S.shareData=saved.shareData||{};

    S.lastFreeSearch=saved.lastFreeSearch||0;
    S.searchCache=saved.searchCache||{};

  if(navigator.share){
    navigator.share({
      title:'Experience Travel — Find Your Perfect Destination',

    }).catch(()=>{});

    if(navigator.clipboard){navigator.clipboard.writeText(copyText).catch(()=>fallbackCopy(copyText));}

};

function loadUserFromSupabase(u, wasUpgraded, sessionId){
  // Reset all user-specific state before loading
  S.saved=[];S.sIds=new Set();S.notes={};S.shareData={};S.archived={};
  S.ans={};S.fA={};S.rqA={};S.freeCnt=0;S.proCnt=0;
  S.isPro=false;S.topupCount=0;S.cmpSel=[];S.aiItineraries={};
  S.err=null;S.scr='dash';
  S.user={
    id:u.id,email:u.email,
    firstName:u.user_metadata?.first_name||'',
    lastName:u.user_metadata?.last_name||'',
    name:u.user_metadata?.first_name||u.email.split('@')[0]
  };

  // Load profile + quiz answers + all user data from Supabase
  supa.from('profiles').select('*').eq('id',u.id).single().then(({data:p})=>{
    if(p){
      S.isPro=p.is_pro||false;
      S.freeCnt=p.free_cnt||0;
      if(p.last_free_search)S.lastFreeSearch=new Date(p.last_free_search).getTime();
      S.proCnt=p.pro_cnt||0;
      S.topupCount=p.topup_count||0;
      S.user={...S.user,
        phone:p.phone||'',country:p.country||'',
        city:p.city||'',bday:p.birthday||''
      };
      // Backfill email if missing in profile
      if(!p.email&&u.email){
        supa.from('profiles').update({email:u.email}).eq('id',u.id).then(()=>{}).catch(()=>{});
      }
      if(p.first_name)S.user.firstName=p.first_name;
      if(p.last_name)S.user.lastName=p.last_name;
      // Restore quiz answers
      if(p.quiz_answers&&Object.keys(p.quiz_answers).length>0)S.ans=p.quiz_answers;
      if(p.rqa_answers&&Object.keys(p.rqa_answers).length>0)S.rqA=p.rqa_answers;
      if(p.notes_data&&Object.keys(p.notes_data).length>0)S.notes=p.notes_data;
    }

    // Load saved destinations
    supa.from('saved_destinations').select('*').eq('user_id',u.id).then(({data:rows})=>{
      if(rows&&rows.length>0){
        S.saved=rows.map(r=>({
          id:r.city_id,city:r.city,country:r.country,flag:r.flag,
          score:r.score,scoreLabel:r.score_label,tt:r.trip_type,
          date:new Date(r.created_at).toLocaleDateString()
        }));
        S.sIds=new Set(S.saved.map(x=>x.id));
        rows.forEach(r=>{
          if(r.notes_data&&typeof r.notes_data==='object')S.notes[r.city_id]=r.notes_data;
          else if(r.notes_data&&typeof r.notes_data==='string'){try{S.notes[r.city_id]=JSON.parse(r.notes_data);}catch(e){}}
          if(r.share_data&&typeof r.share_data==='object')S.shareData[r.city_id]=r.share_data;
          else if(r.share_data&&typeof r.share_data==='string'){try{S.shareData[r.city_id]=JSON.parse(r.share_data);}catch(e){}}
          if(r.is_archived)S.archived[r.city_id]=true;
        });
        // After restoring shareData, subscribe to realtime for all shared trips with tokens
        setTimeout(()=>{
          rows.forEach(r=>{
            const sd=S.shareData[r.city_id];
            if(sd?.token){
              console.log('Restoring realtime sub for',r.city,'token:',sd.token);
              subscribeToSharedTrip(sd.token,r.city_id,r.city);
            }
          });
        },1500);
      }

      // Handle Stripe upgrade redirect
      if(wasUpgraded&&S.user?.id){
        fetch('/api/verify-payment',{
          method:'POST',headers:{'Content-Type':'application/json'},
          body:JSON.stringify({userId:S.user.id,sessionId})
        }).then(r=>r.json()).then(result=>{
          if(result.isPro){S.isPro=true;S.showProWelcome=true;}
          render();saveState();
        }).catch(()=>{render();saveState();});
      }else{
        if(S.pendingShare&&S.pendingShare.data){acceptSharedTrip();}
        else{
          render();saveState();
          // Start realtime subscriptions for shared destinations
          setTimeout(setupRealtimeForSharedDestinations, 1000);
          // Request notification permission
          setTimeout(requestNotificationPermission, 2000);
        }
      }
    });
  });
}

function acceptSharedTrip(){
  const share=S.pendingShare?.data;
  if(!share||!S.user?.id)return;
  const item={
    id:share.city_id,city:share.city,country:share.country,
    flag:share.flag,score:share.score,scoreLabel:share.score_label,
    tt:share.trip_type,date:new Date().toLocaleDateString()
  };
  // Load master notes
  if(share.shared_notes){
    const sn=typeof share.shared_notes==='object'?share.shared_notes:JSON.parse(share.shared_notes||'{}');
    if(sn&&Object.keys(sn).length>0)S.notes[item.id]=sn;
  }else if(share.share_note){
    const n=S.notes[item.id]||{text:'',todos:[],savedBy:'',savedAt:''};
    if(!n.text)n.text=share.share_note;
    S.notes[item.id]=n;
  }
  // Store share token so recipient can push edits back
  if(!S.shareData[item.id])S.shareData[item.id]={people:[]};
  S.shareData[item.id].token=share.token;
  // Add to saved list
  if(!S.sIds.has(item.id)){
    S.saved=[...S.saved,item];
    S.sIds=new Set([...S.sIds,item.id]);
  }
  // Save to Supabase - includes share_data with token so it persists on next login
  supaSaveDestination(S.user.id,item);
  saveState();
  saveQuizProgress();
  // Mark as joined
  if(share.token&&S.user?.email){
    try{
      const people=JSON.parse(share.people||'[]');
      const updated=people.map(p=>p.email===S.user?.email?{...p,joined:true}:p);
      supa.from('shared_trips').update({people:JSON.stringify(updated)})
        .eq('token',share.token).then(()=>{}).catch(()=>{});
    }catch(e){}
  }
  // Subscribe to realtime updates
  setTimeout(()=>subscribeToSharedTrip(share.token,item.id,item.city),500);
  S.pendingShare=null;
  toast('✓ '+share.city+' added to your destinations!');
  st({scr:'dash',showSv:true});
}

// Track active realtime subscriptions
let _realtimeSubs = {};

function subscribeToSharedTrip(token, cityId, cityName){
  if(!token||_realtimeSubs[token])return; // already subscribed
  console.log('Subscribing to realtime for', cityName, token);
  const sub = supa.channel('shared_trip_'+token)
    .on('postgres_changes',{
      event:'UPDATE',
      schema:'public',
      table:'shared_trips',
      filter:'token=eq.'+token
    }, (payload)=>{
      console.log('Realtime update for', cityName, payload);
      const newNotes = payload.new?.shared_notes;
      if(!newNotes)return;
      const current = S.notes[cityId];
      const currentTodos = (current?.todos||[]).length;
      const newTodos = (typeof newNotes==='object'?newNotes:JSON.parse(newNotes||'{}')).todos||[];
      // Update local notes
      S.notes[cityId] = typeof newNotes==='object'?newNotes:JSON.parse(newNotes||'{}');
      saveState();
      saveQuizProgress();
      // If notes modal is open for this city, refresh it
      if(S.notesId===cityId){
        const h=rNotes();
        if(h)showModalDirect(h);
      }
      // Show notification
      const added = newTodos.length - currentTodos;
      if(added>0){
        const who = payload.new?.owner_name||'Someone';
        showSharedNotification(cityName, who+' added '+added+' item'+(added>1?'s':'')+' to the plan');
      } else if(newTodos.length !== currentTodos || JSON.stringify(newNotes)!==JSON.stringify(current)){
        showSharedNotification(cityName, 'Plan notes were updated');
      }
    })
    .subscribe((status)=>{
      console.log('Realtime status for', cityName+':', status);
    });
  _realtimeSubs[token] = sub;
}

function unsubscribeAll(){
  Object.values(_realtimeSubs).forEach(sub=>{
    try{supa.removeChannel(sub);}catch(e){}
  });
  _realtimeSubs={};
}

function setupRealtimeForSharedDestinations(){
  // Subscribe to all destinations that have share tokens
  Object.entries(S.shareData||{}).forEach(([cityId,sd])=>{
    if(sd?.token&&(sd.people||[]).length>0){
      const saved=S.saved.find(x=>x.id===cityId);
      if(saved)subscribeToSharedTrip(sd.token, cityId, saved.city);
    }
  });
}

async function requestNotificationPermission(){
  if(!('Notification' in window))return false;
  if(Notification.permission==='granted')return true;
  if(Notification.permission==='denied')return false;
  const result=await Notification.requestPermission();
  return result==='granted';
}
function checkSession(){
  const _search=window.location.search;
  const _hash=window.location.hash;
  // Handle Supabase email confirmation redirect
  // Supabase appends #access_token=...&type=signup or ?token_hash=...&type=signup
  const _isRecovery=(_hash.includes('access_token')&&_hash.includes('type=recovery'))||
    (_search.includes('token_hash')&&_search.includes('type=recovery'));
  if(_isRecovery){
    history.replaceState({},'','/');
    // Show password reset form
    supa.auth.getSession().then(({data:{session}})=>{
      if(session){
        // User is authenticated via recovery token - show change password screen
        loadUserFromSupabase(session.user,false,'');
        setTimeout(()=>{
          toast('Set your new password in My Account → Change Password');
          st({showAc:true,acTab:'password'});
        },800);
      }else{
        st({scr:'login',err:'Reset link expired. Please request a new one.'});
      }
    });
    return;
  }
  const _isConfirmation=(_hash.includes('access_token')&&_hash.includes('type=signup'))||
    (_search.includes('token_hash')&&_search.includes('type=signup'))||
    (_search.includes('token_hash')&&_search.includes('type=email'));
  if(_isConfirmation){
    history.replaceState({},'','/');
    // Let Supabase process the token then load user
    supa.auth.getSession().then(({data:{session}})=>{
      if(session){
        loadUserFromSupabase(session.user,false,'');
        setTimeout(()=>toast('✓ Email confirmed! Welcome to Experience Travel 🎉'),600);
      }else{
        // PKCE flow - exchange token
        supa.auth.exchangeCodeForSession(new URLSearchParams(_search).get('token_hash')||'')
          .then(({data:{session:s2}})=>{
            if(s2)loadUserFromSupabase(s2.user,false,'');
            else st({scr:'login',err:'Confirmation failed. Please try again.'});
          }).catch(()=>st({scr:'login',err:'Confirmation link expired. Please sign up again.'}));
      }
    });
    return;
  }
  const _path=window.location.pathname;
  const _wasUpgraded=_search.includes('upgraded=true');
  const _wasCancelled=_search.includes('upgrade=cancelled');
  const _sessionId=new URLSearchParams(_search).get('session_id')||'';
  if(_wasUpgraded||_wasCancelled)history.replaceState({},'','/');
  if(_wasCancelled)setTimeout(()=>toast('Payment cancelled — you have not been charged.'),800);
  // Detect shared trip link: /share/TOKEN
  const _shareMatch=_path.match(/^\/share\/([a-z0-9]+)\/?$/i)||_path.match(/\/share\/([a-z0-9]{8,20})/i);
  if(_shareMatch){
    const token=_shareMatch[1];
    console.log('Share token detected:',token,'from path:',_path);
    history.replaceState({},'','/');
    loadSharedTrip(token);
    return;
  }

  supa.auth.getSession().then(({data})=>{
    const session=data.session;
    if(session&&session.user){
      loadUserFromSupabase(session.user,_wasUpgraded,_sessionId);
    }else{
      S.user=null;S.saved=[];S.sIds=new Set();S.notes={};S.shareData={};
      S.ans={};S.fA={};S.rqA={};S.isPro=false;S.freeCnt=0;S.proCnt=0;
      S.cmpSel=[];S.aiItineraries={};S.userProfile=null;S.tt=null;
      localStorage.removeItem(STORAGE_KEY);
      render();
    }
  }).catch(()=>render());
}

function doSearch(){
  saveQuizProgress();
  // Check result cache (1 hour TTL)
  const cacheKey=(S.tt||'')+'|'+JSON.stringify(S.ans)+'|'+JSON.stringify(S.fA||{});
  if(!S.searchCache)S.searchCache={};
  const cached=S.searchCache[cacheKey];
  if(cached&&cached.ts&&(Date.now()-cached.ts)<3600000){
    console.log('✅ Using cached results');
    st({scr:'results',res:cached.res,cmpSel:[],cmpType:S.tt});
    return;
  }
  if(!S.isPro){
    const now=Date.now();
    const lastSearch=S.lastFreeSearch||0;
    const hoursSince=(now-lastSearch)/(1000*60*60);
    const canSearch=!lastSearch||hoursSince>=24;
    if(!canSearch){
      const hoursLeft=Math.ceil(24-hoursSince);
      st({showPW:true,pwMsg:'Your free search resets in '+hoursLeft+' hour'+(hoursLeft===1?'':'s')+'. Upgrade to Pro for unlimited searches.'});
      return;
    }
    S.lastFreeSearch=now;
    st({scr:'loading',freeCnt:S.freeCnt+1});
    if(S.user?.id)supa.from('profiles').update({free_cnt:S.freeCnt+1,last_free_search:new Date(now).toISOString()}).eq('id',S.user.id).then(()=>{}).catch(()=>{});
  }else{
    st({scr:'loading'});
  }

  const isST=S.tt==='st';
  const qs=isST?STQ:LTQ;

  // Build quiz summary
  const quizLines=QS.map((q,i)=>{
    const a=S.ans[i];
    if(a===undefined||a===null)return null;
    if(q.t==='s')return q.q+': '+q.o[a];
    if(q.t==='m'&&Array.isArray(a))return q.q+': '+a.map(x=>q.o[x]).join(', ');
    if(q.t==='db'&&Array.isArray(a))return 'DEAL-BREAKERS (hard rules): '+a.map(x=>q.o[x]).join(', ');
    if(q.t==='text')return q.q+': '+(a||'No preference');
    return null;
  }).filter(Boolean);

  const fuLines=qs.map((q,i)=>{
    const a=S.fA[i];
    if(a===undefined||a===null||a==='')return null;
    if(q.t==='text')return q.q+': '+(a||'No preference');
    if(q.t==='s')return q.o[a]?q.q+': '+q.o[a]:null;
    if(q.t==='m'&&Array.isArray(a))return q.q+': '+a.map(x=>q.o[x]).join(', ');
    return null;
  }).filter(Boolean);

  S.userProfile={quizLines,fuLines,isST};

  // Key signals (no nested template literals)
  const moveReason=fuLines.find(l=>l.includes('Why are you moving'))||'';
  const purpose=fuLines.find(l=>l.includes('kind of trip'))||'';
  const tripBudget=fuLines.find(l=>l.includes('budget')||l.includes('Budget'))||'';
  const stayLength=fuLines.find(l=>l.includes('How long'))||'';
  const dealBreakers=quizLines.find(l=>l.includes('DEAL-BREAKER'))||'';
  const budget=quizLines.find(l=>l.toLowerCase().includes('budget')||l.toLowerCase().includes('afford'))||'';

  // Build rules using string concat to avoid nested backtick issues
  let rules='';
  if(moveReason) rules+='\n- This person is moving abroad for: '+moveReason.split(': ').slice(1).join(': ')+'. Every recommendation must serve this purpose.';
  if(purpose) rules+='\n- This person wants: '+purpose.split(': ').slice(1).join(': ')+'. Prioritise destinations that excel at this.';
  if(stayLength) rules+='\n- Duration: '+stayLength.split(': ').slice(1).join(': ')+'. Factor visa availability.';
  if(dealBreakers) rules+='\n- '+dealBreakers+'. Exclude ANY destination with these — this is mandatory.';
  if(budget) rules+='\n- Budget context: '+budget.split(': ').slice(1).join(': ')+'. Only recommend destinations that fit.';

  const prompt='You are a world-class '+(isST?'travel':'relocation')+' expert who gives deeply personalised recommendations. Your recommendations MUST be completely different for different profiles — a retiree and a student should NEVER get the same cities.\n\n'
    +(isST?'TRIP PROFILE':'RELOCATION PROFILE')+':'+'\n'+quizLines.join('\n')
    +(fuLines.length?'\n\nFOLLOW-UP ANSWERS:\n'+fuLines.join('\n'):'')
    +'\n\nCRITICAL PERSONALISATION RULES:'+rules
    +'\n- The highlights field must explain specifically WHY this destination fits THIS person — not generic facts.'
    +'\n- If retirement: recommend calm lifestyle, healthcare, low cost, expat retirement communities.'
    +'\n- If education: recommend university cities, student culture, affordable living.'
    +'\n- If career/remote work: recommend coworking, fast internet, tech scenes.'
    +'\n- If adventure: recommend outdoor activities, varied terrain, active scenes.'
    +'\n- Score differences MUST be meaningful — spread scores across a real range.'
    +'\n\nRecommend the 4 best '+(isST?'short-term travel destinations':'cities to relocate to long-term')+' for this specific person.'
    +'\n\nReturn ONLY valid JSON — no markdown, no explanation:\n{"results":[{"city":"City Name","country":"Country Name","flag":"🇵🇹","score":95,"scoreLabel":"Exceptional Match","highlights":["Specific reason for this person 1","Specific reason 2","Specific reason 3","Specific reason 4"]}]}';

  fetch('/api/proxy',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      model:'claude-haiku-4-5-20251001',
      max_tokens:1500,
      messages:[{role:'user',content:prompt}]
    })
  }).then(r=>r.json()).then(data=>{
    const txt=(data.content&&data.content[0]&&data.content[0].text)||'';
    const s=txt.indexOf('{'),e=txt.lastIndexOf('}')+1;
    if(s>=0&&e>0){
      try{
        const parsed=JSON.parse(txt.slice(s,e));
        if(parsed.results&&parsed.results.length){
          S.searchCache[cacheKey]={res:parsed.results,ts:Date.now()};
          saveState();
          st({scr:'results',res:parsed.results,err:null});
          return;
        }
      }catch(err){console.error('Parse err:',err);}
    }
    st({scr:'search_error',searchErr:'Could not parse results. Please try again.'});
  }).catch(()=>st({scr:'search_error',searchErr:'Connection error. Please check your internet and try again.'}));
}

function syncDestinationToSupabase(cityId){

  }

    const notes=S.notes[cityId]||null;
    console.log('Pushing shared_notes for',cityId,'token:',token,'notes:',!!notes);
    supa.from('shared_trips').update({shared_notes:notes})

        if(error)console.error('shared_notes push error:',error.message);

  const ph=document.getElementById('ap')?.value.trim()||'';
  const bday=document.getElementById('abday')?.value||'';
  const co=document.getElementById('aco')?.value.trim()||'';

  if(!e||!e.includes('@')){st({acMsg:'Please enter a valid email.'});return;}

  const userId=S.user?.id;

  S.user=updated;
  saveState();
  st({acMsg:'✓ Saved!'});
  // Save to Supabase
  if(userId){

    if(bday&&bday.trim())profileUpdate.birthday=bday;
    supa.from('profiles').update(profileUpdate).eq('id',userId).then(({error})=>{

        console.error('Profile save error:',error.message);

window.shareFromResult=function(city,country,flag,score,scoreLabel,idx){
  const label=scoreLabel||'Great Match';
  const isST=(S.tt||'st')==='st';
  const firstName=S.user?.firstName||'';
  const who=firstName||'Someone';
  // Message text only - NO URL so iMessage shows the card image not a link preview
  const msg=who+' matched '+score+'% with '+flag+' '+city+' on Experience Travel!\n\nFind your perfect destination \u2193\nletsexperiencetravel.com';

  // Save to shared_trips so if they do share the link it works
  if(S.user?.id){
    const cityId=city+'-'+country;
    if(!S.shareData[cityId])S.shareData[cityId]={people:[],token:genToken()};
    if(!S.shareData[cityId].token)S.shareData[cityId].token=genToken();
    const token=S.shareData[cityId].token;
    if(!S.sIds.has(cityId)){
      const r2=(Array.isArray(S.res)?S.res[idx]:null)||{highlights:[]};
      const item={id:cityId,tt:S.tt||'st',city,country,flag,score,scoreLabel:label,highlights:r2.highlights||[],date:new Date().toLocaleDateString()};
      S.saved=[...S.saved,item];S.sIds=new Set([...S.sIds,cityId]);
      saveState();supaSaveDestination(S.user.id,item).catch(()=>{});
    }
    supa.from('shared_trips').upsert({
      token,owner_id:S.user.id,owner_name:who,city_id:cityId,city,country,flag,score,
      score_label:label,trip_type:S.tt||'st',share_note:'',people:'[]'
    },{onConflict:'token'}).then(()=>saveState()).catch(()=>{});
  }

  // Generate canvas match card
  try{
    const canvas=document.createElement('canvas');
    canvas.width=1080;canvas.height=1080;
    const ctx=canvas.getContext('2d');
    if(!ctx)throw new Error('no ctx');

    // Background
    const bg=ctx.createLinearGradient(0,0,1080,1080);
    bg.addColorStop(0,'#0A0A0F');bg.addColorStop(0.5,'#12080F');bg.addColorStop(1,'#0A0F12');
    ctx.fillStyle=bg;ctx.fillRect(0,0,1080,1080);
    const g1=ctx.createRadialGradient(540,200,0,540,200,500);
    g1.addColorStop(0,'rgba(229,53,160,.2)');g1.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=g1;ctx.fillRect(0,0,1080,1080);
    const g2=ctx.createRadialGradient(900,900,0,900,900,400);
    g2.addColorStop(0,'rgba(245,228,32,.15)');g2.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=g2;ctx.fillRect(0,0,1080,1080);

    // Score ring
    const cx=540,cy=400,rad=210;
    ctx.beginPath();ctx.arc(cx,cy,rad,0,Math.PI*2);
    ctx.strokeStyle='rgba(255,255,255,.08)';ctx.lineWidth=22;ctx.stroke();
    const prog=(score/100)*Math.PI*2;
    ctx.beginPath();ctx.arc(cx,cy,rad,-Math.PI/2,-Math.PI/2+prog);
    const arcG=ctx.createLinearGradient(cx-rad,cy,cx+rad,cy);
    arcG.addColorStop(0,'#F5E420');arcG.addColorStop(1,'#E535A0');
    ctx.strokeStyle=arcG;ctx.lineWidth=22;ctx.lineCap='round';ctx.stroke();

    // Flag
    ctx.font='120px serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(flag||'✈️',cx,cy);

    // Score %
    ctx.textBaseline='alphabetic';
    ctx.font='bold 96px -apple-system,Arial,sans-serif';
    ctx.fillStyle='#ffffff';ctx.textAlign='center';
    ctx.fillText(score+'%',cx,cy+rad+80);
    ctx.font='24px -apple-system,Arial,sans-serif';
    ctx.fillStyle='rgba(255,255,255,.4)';
    ctx.fillText('match score',cx,cy+rad+120);

    // City + Country
    ctx.font='bold 60px -apple-system,Arial,sans-serif';
    ctx.fillStyle='#ffffff';ctx.fillText(city,cx,cy+rad+195);
    ctx.font='30px -apple-system,Arial,sans-serif';
    ctx.fillStyle='rgba(255,255,255,.5)';ctx.fillText(country,cx,cy+rad+242);

    // Score label
    const lc=score>=90?'#F5E420':score>=80?'#E535A0':'rgba(255,255,255,.6)';
    ctx.font='bold 26px -apple-system,Arial,sans-serif';
    ctx.fillStyle=lc;ctx.fillText(label.toUpperCase(),cx,cy+rad+292);

    // Footer
    ctx.font='26px -apple-system,Arial,sans-serif';
    ctx.fillStyle='rgba(255,255,255,.35)';
    ctx.fillText('My '+(isST?'travel':'relocation')+' match on',cx,925);
    const brG=ctx.createLinearGradient(180,0,900,0);
    brG.addColorStop(0,'#F5E420');brG.addColorStop(0.5,'#F5A623');brG.addColorStop(1,'#E535A0');
    ctx.font='bold 52px -apple-system,Arial,sans-serif';
    ctx.fillStyle=brG;ctx.fillText('Experience Travel',cx,988);

    canvas.toBlob(function(blob){
      if(!blob){fallbackShare();return;}
      const fname=city.toLowerCase().replace(/\s+/g,'-')+'-match.png';
      const file=new File([blob],fname,{type:'image/png'});
      if(navigator.share&&navigator.canShare&&navigator.canShare({files:[file]})){
        // Mobile: share image file + text only (NO url = no link preview = card shows as image)
        navigator.share({files:[file],text:msg}).catch(err=>{
          if(err&&err.name!=='AbortError')fallbackShare();
        });
      }else{
        // Desktop: download the card PNG + copy message to clipboard
        // Step 1: download image
        const objUrl=URL.createObjectURL(blob);
        const a=document.createElement('a');
        a.href=objUrl;a.download=fname;
        document.body.appendChild(a);a.click();
        document.body.removeChild(a);
        setTimeout(()=>URL.revokeObjectURL(objUrl),3000);
        // Step 2: copy message to clipboard
        const clip=msg+'\nhttps://letsexperiencetravel.com';
        if(navigator.clipboard){
          navigator.clipboard.writeText(clip).then(()=>{
            toast('Card downloaded + message copied! ✓ Attach the image and paste the message');
          }).catch(()=>{
            fallbackCopy(clip);
            toast('Card downloaded! Message copied — paste it with the image ✓');
          });
        }else{
          fallbackCopy(clip);
          toast('Card downloaded! ✓ Attach it in iMessage');
        }
      }
    },'image/png');
  }catch(e){console.error('Share error:',e);fallbackShare();}

  function fallbackShare(){
    const canFile=typeof navigator.canShare==='function'&&navigator.canShare({files:[file]});
    if(navigator.share&&canFile){
      // Mobile (iPhone/Android): share image file - shows card in iMessage
      navigator.share({files:[file],text:msg}).catch(err=>{
        if(err&&err.name==='AbortError')return;
        // File share failed, try text only
        navigator.share({title:'Experience Travel',text:msg,url:'https://letsexperiencetravel.com'}).catch(()=>{});
      });
    }else if(navigator.share){
      // Desktop: URL share
      navigator.share({title:'Experience Travel — '+city,text:msg,url:'https://letsexperiencetravel.com'}).catch(()=>{});
    }else{
      fallbackCopy(msg+'\nletsexperiencetravel.com');
      toast('Copied! Paste to share ✓');
    }
  }
};;

function doTextShare(msg,url){
  if(navigator.share){
    navigator.share({title:'Experience Travel',text:msg,url:url}).catch(()=>{});
  }else{
    const clip=msg+'\n'+url;
    if(navigator.clipboard){
      navigator.clipboard.writeText(clip).then(()=>toast('Copied! Paste into iMessage or WhatsApp ✓')).catch(()=>{fallbackCopy(clip);toast('Copied! Paste to share ✓');});
    }else{fallbackCopy(clip);toast('Copied! Paste to share ✓');}
  }
};;;;;

window.doForgot=async function(){
  const email=document.getElementById('fp-email')?.value.trim();
  const errEl=document.getElementById('fp-err');
  if(!email||!/\S+@\S+\.\S+/.test(email)){
    if(errEl)errEl.textContent='Please enter a valid email address';
    return;
  }
  if(errEl)errEl.textContent='Sending...';
  const btn=document.querySelector('button[onclick="window.doForgot()"]');
  if(btn){btn.disabled=true;btn.textContent='Sending...';}
  try{
    const {error}=await supa.auth.resetPasswordForEmail(email,{
      redirectTo:'https://letsexperiencetravel.com/reset-password'
    });
    if(error){
      if(errEl)errEl.textContent=error.message;
      if(btn){btn.disabled=false;btn.textContent='Send Reset Link →';}
    }else{
      st({fpSent:true});
    }
  }catch(e){
    if(errEl)errEl.textContent='Something went wrong. Please try again.';
    if(btn){btn.disabled=false;btn.textContent='Send Reset Link →';}
  }
};
