  canvas.width=1080;canvas.height=1080;
  const ctx=canvas.getContext('2d');
  // Background gradient
  const bg=ctx.createLinearGradient(0,0,1080,1080);
  bg.addColorStop(0,'#0A0A0F');bg.addColorStop(0.5,'#12080F');bg.addColorStop(1,'#0A0F12');

  ctx.fillStyle=glow;ctx.fillRect(0,0,1080,1080);
  // Yellow glow bottom right
  const glow2=ctx.createRadialGradient(1080,1080,0,1080,1080,500);
  glow2.addColorStop(0,'rgba(245,228,32,.1)');glow2.addColorStop(1,'rgba(0,0,0,0)');

  grad.addColorStop(0,'#F5E420');grad.addColorStop(1,'#E535A0');
  ctx.strokeStyle=grad;ctx.lineWidth=20;ctx.lineCap='round';ctx.stroke();

  ctx.font='120px serif';ctx.textAlign='center';ctx.textBaseline='middle';

  ctx.fillText(score+'%',cx,cy+r+60);
  ctx.font='28px Helvetica';ctx.fillStyle='rgba(255,255,255,.5)';
  ctx.fillText('match score',cx,cy+r+100);
  // City name
  ctx.font='bold 72px Helvetica';ctx.fillStyle='#fff';ctx.textAlign='center';
  ctx.fillText(city+(country?', '+country:''),cx,cy+r+180);
  // Label badge
  ctx.font='bold 26px Helvetica';ctx.fillStyle='#F5E420';
  ctx.fillText(scoreLabel.toUpperCase(),cx,cy+r+230);
  // Tag line
  ctx.font='32px Helvetica';ctx.fillStyle='rgba(255,255,255,.45)';
  ctx.fillText(isST?'My travel match on':'My relocation match on',cx,900);
  // Branding
  ctx.font='bold 42px Helvetica';
  const br=ctx.createLinearGradient(cx-150,0,cx+150,0);
  br.addColorStop(0,'#F5E420');br.addColorStop(1,'#E535A0');
  ctx.fillStyle=br;ctx.fillText('Experience Travel',cx,960);
  // Share the canvas
  canvas.toBlob(blob=>{
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');
    a.href=url;a.download='my-match-'+city.toLowerCase().replace(/\s/g,'-')+'.png';

    if(navigator.share){
      const file=new File([blob],'my-match.png',{type:'image/png'});

    }else{
      a.click();
      toast('Card downloaded! Share it anywhere 🎉');
    }
    setTimeout(()=>URL.revokeObjectURL(url),3000);
  },'image/png');
}

window.toggleTodo=function(id,tid){
  const n=getNotes(id);
  n.todos=n.todos.map(t=>t.id===tid?{...t,done:!t.done}:t);
  S.notes[id]=n;
  // Update just the todo row without full re-render
  const row=document.querySelector('[data-tid="'+tid+'"]');
  if(row){
    const t=n.todos.find(x=>x.id===tid);
    if(t){
      row.classList.toggle('done-row',t.done);
      const chk=row.querySelector('.todo-chk');
      if(chk){chk.textContent=t.done?'✓':'';chk.style.background=t.done?'var(--G)':'';chk.style.borderColor=t.done?'var(--G)':'#ccc';}
      const txt=row.querySelector('.todo-txt');
      if(txt){txt.style.textDecoration=t.done?'line-through':'';txt.style.color=t.done?'#aaa':'#333';}
    }
    // Update progress count
    const done=n.todos.filter(x=>x.done).length;
    const prog=document.getElementById('todo-prog');
    if(prog)prog.textContent=done+'/'+n.todos.length+' done';
  }else{render()}
}

    st({scr:'loading',proCnt:S.proCnt+1});
  }
  const isST=S.tt==='st';

  const quizLines=QS.map((q,i)=>{const a=S.ans[i];if(a===undefined||a===null)return null;if(q.t==='s')return q.q+': '+q.o[a];if(q.t==='m'&&Array.isArray(a))return q.q+': '+a.map(x=>q.o[x]).join(', ');if(q.t==='db'&&Array.isArray(a))return 'Deal-breakers: '+a.map(x=>q.o[x]).join(', ');if(q.t==='text')return q.q+': '+(a||'No preference');return null}).filter(Boolean);
  const fuLines=qs.map((q,i)=>{const a=S.fA[i];if(a===undefined||a===null||a==='')return null;if(q.t==='text')return q.q+': '+(a||'No preference');if(q.t==='s')return q.o[a]?q.q+': '+q.o[a]:null;if(q.t==='m'&&Array.isArray(a))return q.q+': '+a.map(x=>q.o[x]).join(', ');return null}).filter(Boolean);
  const prompt=`You are a world-class travel expert. Recommend 4 ${isST?'short-term travel destinations':'cities to relocate to long-term'} based on this profile:\n\nPROFILE:\n${quizLines.join('\n')}\n\n${fuLines.length?'ADDITIONAL:\n'+fuLines.join('\n'):''}

Respond with ONLY a JSON object. No markdown, no backticks, no explanation. Example format:
{"results":[{"city":"Lisbon","country":"Portugal","flag":"🇵🇹","score":92,"scoreLabel":"Exceptional Match","highlights":["reason 1","reason 2","reason 3","reason 4"]}]}

Give exactly 4 results. scoreLabel must be one of: Exceptional Match, Excellent Match, Great Match, Good Match. Use correct flag emojis.`;

  const showFallback=()=>{
    const dl=[{city:"Lisbon",country:"Portugal",flag:"\uD83C\uDDF5\uD83C\uDDF9",score:95,scoreLabel:"Exceptional Match",highlights:["Strong LGBTQ+ protections","D8 Digital Nomad Visa","Large expat community","45% cheaper than US cities"]},{city:"Barcelona",country:"Spain",flag:"\uD83C\uDDEA\uD83C\uDDF8",score:88,scoreLabel:"Excellent Match",highlights:["Progressive rights","Spain Digital Nomad Visa","Mediterranean climate","World-class food"]},{city:"Medell\u00EDn",country:"Colombia",flag:"\uD83C\uDDE8\uD83C\uDDF4",score:81,scoreLabel:"Great Match",highlights:["Eternal spring climate","60% cheaper than US","Growing expat community","Direct US flights"]},{city:"Tbilisi",country:"Georgia",flag:"\uD83C\uDDEC\uD83C\uDDEA",score:74,scoreLabel:"Good Match",highlights:["Visa-free 365 days","70% cheaper than US","Very low crime","Fast internet"]}];
    const ds=[{city:"Lisbon",country:"Portugal",flag:"\uD83C\uDDF5\uD83C\uDDF9",score:94,scoreLabel:"Exceptional Match",highlights:["One of Europe's safest cities","Rich culture","English widely spoken","Affordable food"]},{city:"Tokyo",country:"Japan",flag:"\uD83C\uDDEF\uD83C\uDDF5",score:90,scoreLabel:"Exceptional Match",highlights:["Safest major city","Deep cultural experience","World-class food","Ancient meets modern"]},{city:"Bali",country:"Indonesia",flag:"\uD83C\uDDEE\uD83C\uDDE9",score:84,scoreLabel:"Great Match",highlights:["Tropical climate","Spiritual atmosphere","Very affordable","Thriving creative scene"]},{city:"Mexico City",country:"Mexico",flag:"\uD83C\uDDF2\uD83C\uDDFD",score:78,scoreLabel:"Good Match",highlights:["World-class food","Extraordinary culture","Affordable","Safe neighbourhoods"]}];
    st({scr:'results',res:isST?ds:dl});
  };

  fetch('/api/proxy',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:800,messages:[{role:'user',content:prompt}]})
  })
  .then(r=>r.json())
  .then(data=>{
    try{
      if(data.error)throw new Error(String(data.error.message||data.error));
      const text=(data.content&&data.content[0]&&data.content[0].text)||'';
      console.log('Raw response (first 500):',text.slice(0,500));
      if(!text)throw new Error('empty text');
      // Try to find JSON in the response
      let parsed=null;
      // Method 1: direct parse
      try{parsed=JSON.parse(text);}catch(e){}
      // Method 2: extract between first { and last }
      if(!parsed){
        const s=text.indexOf('{'),e2=text.lastIndexOf('}')+1;
        if(s>=0&&e2>0){try{parsed=JSON.parse(text.slice(s,e2));}catch(e){}}

        const m=text.match(/"results"\s*:\s*\[[\s\S]*?\]\s*}/);

      }
      if(!parsed||!parsed.results||!parsed.results.length){
        console.log('Parse failed, using fallback. Text was:',text.slice(0,200));

      }
      toast('Your matches are ready!');
      st({scr:'results',res:parsed.results});
    }catch(innerErr){
      console.error('Inner error:',innerErr.message);
      showFallback();
    }
  })
  .catch(err=>{
    const msg=err.message||'unknown';
    console.error('Search error:',msg);
    toast('Error: '+msg.slice(0,50));
    setTimeout(showFallback,1500);
  });

nds</li><li>Priority Consultant Access</li></ul>${bP('Choose Annual','upgPro()')}</div></div><div style="text-align:center;padding:0 22px 20px"><p style="font-size:12px;color:#aaa">Cancel Anytime · Secure Checkout</p><div style="margin-top:9px"><span style="cursor:pointer;font-size:13px;font-weight:600;color:${P}" onclick="st({showPW:false})">Keep Free Plan</span></div></div></div></div>`}
